<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Break Down</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px 10px; /* Reduced padding for mobile */
            color: #ffffff;
        }

        .container {
            background-color: #1f3050;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 450px;
            border-top: 8px solid #007BFF;
            position: relative;
            animation: fadeIn 0.5s ease-out;
            touch-action: manipulation;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-top: 0;
            margin-bottom: 30px;
            text-align: center;
            color: #ffffff;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #bbbbbb;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .requirement {
            font-size: 12px;
            color: #ff4d4d;
            font-weight: normal;
            margin-left: 5px;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #2c3e50;
            background-color: #0d1a33;
            color: #ffffff;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            resize: vertical;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #007BFF;
            box-shadow: 0 0 12px rgba(0, 123, 255, 0.3);
            background-color: #162447;
            transform: scale(1.02);
        }

        input::placeholder, textarea::placeholder {
            color: #555;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 35px;
        }

        button, .btn-link {
            background-color: #007BFF;
            color: white;
            font-weight: bold;
            font-size: 17px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            display: block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        button:hover, .btn-link:hover {
            background-color: #0056b3;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
        }

        button:active {
            transform: translateY(-1px);
        }

        .btn-back {
            background-color: transparent;
            border: 2px solid #444;
            color: #999;
            box-shadow: none;
        }

        .btn-back:hover {
            background-color: rgba(255,255,255,0.05);
            color: #fff;
            border-color: #777;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Scrollbar styling for datalist (some browsers) */
        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
            width: 24px; /* Larger touch target */
            height: 24px;
        }

        .btn-toggle {
            flex: 1;
            background-color: #0d1a33;
            border: 2px solid #2c3e50;
            color: #888;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-toggle.active {
            background-color: #007BFF;
            border-color: #007BFF;
            color: white;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.4);
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .input-prefix-wrapper {
            display: flex;
            align-items: center;
            background-color: #0d1a33;
            border: 2px solid #2c3e50;
            border-radius: 12px;
            padding-left: 15px;
            transition: all 0.3s ease;
        }

        .input-prefix-wrapper:focus-within {
            border-color: #007BFF;
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.2);
        }

        .input-prefix-wrapper .prefix {
            color: #007BFF;
            font-weight: bold;
            margin-right: 5px;
            font-size: 16px;
            user-select: none;
        }

        .input-prefix-wrapper input {
            border: none !important;
            background: transparent !important;
            padding-left: 0 !important;
            box-shadow: none !important;
        }

        /* Control Center Styles */
        .control-center {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            padding: 5px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .control-btn {
            flex: 1;
            padding: 12px 10px;
            border: none;
            background: transparent;
            color: #888;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-btn.active {
            background: #007BFF;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        .view-section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .view-section.active {
            display: block;
        }

        /* Pending Records Styles */
        .record-card {
            background-color: rgba(13, 26, 51, 0.6);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border-left: 5px solid #007BFF;
            text-align: left;
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
        }

        .card-item label {
            display: block;
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .card-item span {
            font-weight: 600;
            color: #fff;
            font-size: 14px;
        }

        .problem-section {
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .problem-section label {
            display: block;
            font-size: 12px;
            color: #ffcc00;
            margin-bottom: 8px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .problem-text {
            margin: 0;
            color: #ffffff;
            font-size: 15px;
            font-weight: 500;
            line-height: 1.5;
        }

        .mini-input-group {
            display: flex;
            gap: 10px;
            background-color: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 10px;
        }

        .mini-input-group input {
            flex: 1;
            padding: 10px;
            font-size: 14px;
        }

        .mini-input-group button {
            padding: 10px 15px;
            font-size: 14px;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div id="pendingWorkView" class="view-section active">
            <h2>บันทึกอาการเสีย</h2>
            <form id="pendingForm">
                <div class="form-group">
                    <label for="p_breakdownTime">เวลาแจ้งซ่อม:</label>
                    <input type="text" id="p_breakdownTime" placeholder="-- : --" maxlength="5" inputmode="numeric" autocomplete="off" required>
                </div>

                <div class="form-group">
                    <label for="p_productionLine">ไลน์การผลิต: <span style="font-weight: normal; color: #555; font-size: 12px;">(ตัวอย่าง: Line A1 พิมพ์แค่ A1)</span></label>
                    <div class="input-prefix-wrapper">
                        <span class="prefix">Line </span>
                        <input type="text" id="p_productionLine" placeholder="เช่น A1" autocomplete="off" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="p_machineId">รหัสเครื่องจักร: <span style="font-weight: normal; color: #555; font-size: 12px;">(ตัวอย่าง: BP001)</span></label>
                    <input type="text" id="p_machineId" placeholder="เช่น BP001" autocomplete="off" required>
                </div>

                <div class="form-group">
                    <label for="p_department">หน่วยงาน:</label>
                    <select id="p_department" required style="
                        width: 100%; 
                        padding: 14px; 
                        padding-right: 40px;
                        border-radius: 12px; 
                        border: 2px solid #2c3e50; 
                        background-color: #0d1a33; 
                        color: #ffffff; 
                        font-size: 16px; 
                        appearance: none;
                        -webkit-appearance: none;
                        background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220 0 24 24%22%20fill%3D%22none%22%20stroke%3D%22%23888%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226 9 12 15 18 9%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E');
                        background-repeat: no-repeat;
                        background-position: right 15px center;
                        background-size: 18px;
                        transition: all 0.3s ease;">
                        <option value="" disabled selected>เลือกหน่วยงาน</option>
                        <option value="Press">Press</option>
                        <option value="Ass'y">Ass'y</option>
                        <option value="Project">Project</option>
                        <option value="UT">UT</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="p_problem">อาการเสีย <span class="requirement">(ขั้นต่ำ 20 ตัวอักษร)</span>:</label>
                    <textarea id="p_problem" placeholder="ระบุอาการเสีย (อย่างน้อย 20 ตัวอักษร)" rows="3" required minlength="20"></textarea>
                    <div id="p_problemCount" style="font-size: 11px; text-align: right; color: #888; margin-top: 5px;">0 / 20</div>
                </div>

                <div class="button-group">
                    <button type="submit">บันทึกงาน</button>
                    <a href="index.html" class="btn-link btn-back">กลับหน้าหลัก</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function setupCharCounter(id, countId, min) {
            const el = document.getElementById(id);
            const countEl = document.getElementById(countId);
            if (!el || !countEl) return;
            
            const update = () => {
                const len = el.value.length;
                countEl.textContent = `${len} / ${min}`;
                if (len < min) {
                    countEl.style.color = '#ff4d4d';
                } else {
                    countEl.style.color = '#4ade80';
                }
            };
            
            el.addEventListener('input', update);
            update();
        }
        
        setupCharCounter('p_problem', 'p_problemCount', 20);

        // Force Uppercase Logic
        document.getElementById('p_productionLine').addEventListener('input', function() {
            this.value = this.value.toUpperCase();
        });
        document.getElementById('p_machineId').addEventListener('input', function() {
            this.value = this.value.toUpperCase();
        });

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYPLqS7Xaiyc9Ev5GoMZoOEkndOVXtASyrsqu2n9GvLyusKXa0pKdoxb4FO6vrAUYgkw/exec";

        function setupTimeInput(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('input', function(e) {
                const originalValue = e.target.value;
                const originalCursor = e.target.selectionStart;
                
                let digits = originalValue.replace(/\D/g, '');
                let formatted = '';

                if (digits.length > 2) {
                    let hh = digits.slice(0, 2);
                    let mm = digits.slice(2, 4);
                    if (parseInt(hh) > 23) hh = '23';
                    if (parseInt(mm) > 59) mm = '59';
                    formatted = hh + ":" + mm;
                } else if (digits.length > 0) {
                    let hh = digits;
                    if (parseInt(hh) > 23) hh = '23';
                    formatted = hh;
                }

                if (originalValue !== formatted) {
                    e.target.value = formatted;
                    // Fix cursor position
                    let newCursor = originalCursor;
                    if (formatted.length > originalValue.length && originalCursor === 3) {
                        newCursor = 4;
                    } else if (formatted.length < originalValue.length && originalCursor === 3) {
                        newCursor = 2;
                    }
                    e.target.setSelectionRange(newCursor, newCursor);
                }
            });
        }
        
        setupTimeInput('p_breakdownTime');

        // Pending Form Submit Logic
        document.getElementById('pendingForm').onsubmit = async (e) => {
            e.preventDefault();
            const form = e.target;
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.innerHTML;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> กำลังบันทึก...';

            const time = document.getElementById('p_breakdownTime').value;
            const line = "Line " + document.getElementById('p_productionLine').value.trim();
            const machineId = document.getElementById('p_machineId').value.trim();
            const department = document.getElementById('p_department').value.trim();
            const problem = document.getElementById('p_problem').value.trim();

            const breakdownEntry = {
                id: Date.now(),
                time: time,
                line: line,
                machineId: machineId,
                department: department,
                problem: problem,
                solution: "-",
                sparePart: "-",
                finishTime: "-",
                duration: "-",
                sevenMean: "",
                caseCount: 1,
                date: "'" + String(new Date().getDate()).padStart(2, '0') + '/' + String(new Date().getMonth() + 1).padStart(2, '0') + '/' + new Date().getFullYear() + ' ' + String(new Date().getHours()).padStart(2, '0') + ':' + String(new Date().getMinutes()).padStart(2, '0') + ':' + String(new Date().getSeconds()).padStart(2, '0')
            };

            try {
                const formData = new URLSearchParams();
                for (const key in breakdownEntry) {
                    formData.append(key, breakdownEntry[key]);
                }

                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });

                const data = localStorage.getItem("breakdowns");
                const breakdowns = data ? JSON.parse(data) : [];
                breakdowns.push(breakdownEntry);
                localStorage.setItem("breakdowns", JSON.stringify(breakdowns));

                alert("บันทึกงานสำเร็จ!");
                window.location.href = "dashboard.html";
            } catch (error) {
                console.error(error);
                alert("เกิดข้อผิดพลาด แต่ข้อมูลถูกบันทึกไว้ในเครื่องแล้ว");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnText;
            }
        };
    </script>
</body>
</html>

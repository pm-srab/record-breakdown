<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance History - SRAB</title>
    <style>
        :root {
            --primary: #007BFF;
            --primary-glow: rgba(0, 123, 255, 0.4);
            --bg: #1a1a1a;
            --card-bg: #161b22;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 0;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            font-weight: 800;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .search-container {
            margin-bottom: 15px;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 12px 18px;
            padding-right: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .status-badges {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
            min-height: 35px;
        }

        .qr-indicator {
            display: none;
            background: rgba(0, 123, 255, 0.1);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid rgba(0, 123, 255, 0.2);
            white-space: nowrap;
        }

        .count-badge {
            display: none;
            background: rgba(255, 71, 87, 0.1);
            color: #ff4757;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid rgba(255, 71, 87, 0.2);
            white-space: nowrap;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .record-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            transition: transform 0.2s ease;
        }

        .record-card:active {
            transform: scale(0.98);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 12px;
        }

        .machine-id {
            font-size: 18px;
            font-weight: 800;
            color: var(--primary);
        }

        .record-date {
            font-size: 12px;
            color: var(--text-dim);
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .info-item label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .info-item span {
            font-size: 14px;
            font-weight: 600;
        }

        .problem-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .problem-box label {
            display: block;
            font-size: 10px;
            color: #ff4757;
            margin-bottom: 5px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .problem-text {
            font-size: 14px;
            line-height: 1.4;
        }

        .solution-box {
            background: rgba(40, 167, 69, 0.05);
            padding: 12px;
            border-radius: 12px;
            border-left: 3px solid #28a745;
        }

        .solution-box label {
            display: block;
            font-size: 10px;
            color: #28a745;
            margin-bottom: 5px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .spare-badge {
            display: inline-block;
            background: rgba(162, 155, 254, 0.1);
            color: #a29bfe;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            margin-top: 10px;
            border: 1px solid rgba(162, 155, 254, 0.2);
        }

        .no-results {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-dim);
        }

        .loading-spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ประวัติการซ่อม (History)</h1>
            <div>
                <a href="index.html" class="btn-back">
                    กลับหน้าหลัก
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
                </a>
            </div>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search Machine ID (e.g. BP001)..." oninput="handleSearch()">
            <svg style="position: absolute; right: 15px; top: 12px; color: #555;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </div>

        <div class="status-badges">
            <div id="qrIndicator" class="qr-indicator">
                ✨ Scanned Machine Detected
            </div>
            <div id="countBadge" class="count-badge">
                Total: 0 Breakdowns
            </div>
        </div>

        <div id="loading" class="loading-spinner" style="display: none;"></div>
        <div id="historyList" class="history-list"></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYPLqS7Xaiyc9Ev5GoMZoOEkndOVXtASyrsqu2n9GvLyusKXa0pKdoxb4FO6vrAUYgkw/exec";
        let allRecords = [];

        async function init() {
            // 1. Check for URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const machineId = urlParams.get('machineId');
            
            if (machineId) {
                document.getElementById('searchInput').value = machineId.toUpperCase();
                document.getElementById('qrIndicator').style.display = 'block';
                document.getElementById('qrIndicator').textContent = `🔍 Filtering for: ${machineId.toUpperCase()}`;
            }

            // 2. Load data
            await loadRecords();
        }

        async function loadRecords() {
            const list = document.getElementById('historyList');
            const loading = document.getElementById('loading');
            
            // Try localStorage first
            const localData = localStorage.getItem("breakdowns");
            if (localData) {
                allRecords = JSON.parse(localData);
                renderRecords(allRecords);
            }

            // Fetch fresh data
            loading.style.display = 'block';
            try {
                const response = await fetch(SCRIPT_URL);
                const googleData = await response.json();
                
                if (googleData && Array.isArray(googleData)) {
                    allRecords = googleData
                        .map((row, idx) => ({
                            date: row[0],
                            line: row[1],
                            machineId: row[2],
                            time: row[3],
                            finishTime: row[4],
                            duration: row[5],
                            department: row[6],
                            factory: row[7],
                            problem: row[8],
                            solution: row[9],
                            sparePart: row[10],
                            sevenMean: row[11]
                        }))
                        .filter((r, idx) => {
                            const isHeader = String(r.date).includes("วันที่") || String(r.machineId).includes("เครื่องจักร");
                            return idx > 0 && r.date && r.machineId && !isHeader;
                        });
                    
                    localStorage.setItem("breakdowns", JSON.stringify(allRecords));
                    renderRecords(allRecords);
                }
            } catch (err) {
                console.error("Fetch error:", err);
            } finally {
                loading.style.display = 'none';
            }
        }

        function handleSearch() {
            const input = document.getElementById('searchInput');
            input.value = input.value.toUpperCase();
            const query = input.value;
            // Hide QR indicator if user starts typing something else
            if (query && !window.location.search.includes(query)) {
                document.getElementById('qrIndicator').style.display = 'none';
            }
            renderRecords(allRecords);
        }

        function renderRecords(records) {
            const list = document.getElementById('historyList');
            const countBadge = document.getElementById('countBadge');
            const query = document.getElementById('searchInput').value.trim().toUpperCase();
            
            let filtered = records;
            if (query) {
                filtered = records.filter(r => 
                    String(r.machineId).toUpperCase().includes(query) || 
                    String(r.problem).toUpperCase().includes(query)
                );
            }

            // Update count badge
            if (query && filtered.length > 0) {
                countBadge.style.display = 'block';
                countBadge.innerHTML = `⚠️ ทั้งหมด: ${filtered.length} ครั้ง`;
            } else {
                countBadge.style.display = 'none';
            }

            // Sort by date (newest first)
            filtered.sort((a, b) => {
                // Simplified sort by assuming row index/original order was chronological
                return 0; // The data from sheet is usually chronological, so we can just reverse it if needed
            });
            
            // Actually, let's reverse it to show newest at top
            const displayList = [...filtered].reverse();

            if (displayList.length === 0) {
                list.innerHTML = `<div class="no-results">No records found ${query ? `for "${query}"` : ''}</div>`;
                return;
            }

            list.innerHTML = displayList.map(r => `
                <div class="record-card">
                    <div class="card-header">
                        <div class="machine-id">${r.machineId}</div>
                        <div class="record-date">${formatDMY(r.date)}</div>
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <label>Line</label>
                            <span>${r.line}</span>
                        </div>
                        <div class="info-item">
                            <label>Time</label>
                            <span>${formatTimeOnly(r.time)} - ${formatTimeOnly(r.finishTime)}</span>
                        </div>
                        <div class="info-item">
                            <label>Department</label>
                            <span>${r.department}</span>
                        </div>
                        <div class="info-item">
                            <label>Factory</label>
                            <span>${r.factory || '-'}</span>
                        </div>
                        <div class="info-item">
                            <label>Duration</label>
                            <span>${r.duration || '-'}</span>
                        </div>
                    </div>

                    <div class="problem-box">
                        <label>อาการเสีย (Problem)</label>
                        <div class="problem-text">${r.problem}</div>
                    </div>

                    <div class="solution-box">
                        <label>วิธีแก้ไข (Solution)</label>
                        <div class="problem-text">${r.solution || '-'}</div>
                    </div>

                    ${r.sparePart && r.sparePart !== '-' ? `<div class="spare-badge">🔧 ${r.sparePart}</div>` : ''}
                </div>
            `).join('');
        }

        function formatDMY(dateStr) {
            if (!dateStr) return "-";
            const str = String(dateStr).replace(/^'/, '');
            
            const isoMatch = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
            if (isoMatch) return `${isoMatch[3]}/${isoMatch[2]}/${isoMatch[1]}`;

            const strictDmyMatch = str.match(/^(\d{2})\/(\d{2})\/(\d{4})(.*)$/);
            if (strictDmyMatch) return `${strictDmyMatch[1]}/${strictDmyMatch[2]}/${strictDmyMatch[3]}`;
            
            const dmyMatch = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
            if (dmyMatch) {
                let d = dmyMatch[1].padStart(2, '0');
                let m = dmyMatch[2].padStart(2, '0');
                let y = dmyMatch[3];
                if (y.length === 2) y = "20" + y;
                return `${d}/${m}/${y}`;
            }

            return dateStr;
        }

        function formatTimeOnly(timeStr) {
            if (!timeStr || timeStr === "-") return "-";
            const str = String(timeStr);
            
            if (str.includes('T') || str.includes('-')) {
                try {
                    const d = new Date(str);
                    if (!isNaN(d.getTime())) {
                        return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                    }
                } catch (e) {}
            }
            
            const simpleTimeMatch = str.match(/^(\d{1,2}:\d{2})/);
            if (simpleTimeMatch) return simpleTimeMatch[1];
            
            return timeStr;
        }

        window.onload = init;
    </script>
</body>
</html>

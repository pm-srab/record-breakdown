<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ปิดรหัส 7 mean - Maintenance Records</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            margin: 0;
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            justify-content: center;
            padding: 40px 0;
        }

        /* Main Content Styles */
        .main-content {
            width: 90%;
            max-width: 800px;
            animation: fadeIn 0.5s ease-out;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            margin: 0;
            font-size: 28px;
            color: #007BFF;
            letter-spacing: 1px;
        }

        .btn-back {
            background-color: transparent;
            border: 2px solid #444;
            color: #999;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background-color: rgba(255,255,255,0.05);
            color: #fff;
            border-color: #007BFF;
        }

        .record-card {
            background-color: #1f3050;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border-left: 5px solid #007BFF;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 columns on mobile */
            gap: 12px;
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            .card-grid {
                grid-template-columns: 1fr; /* 1 column on very small phones */
            }
        }

        .card-item label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .card-item span {
            font-weight: 600;
            color: #fff;
        }

        .input-group {
            display: flex;
            gap: 10px;
            background-color: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
        }

        .input-group input {
            flex: 1;
            background-color: #0d1a33;
            border: 1px solid #2c3e50;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        .input-group button {
            background-color: #007BFF;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .input-group button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .input-group {
                flex-direction: column;
            }
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }

        .no-data {
            text-align: center;
            padding: 100px;
            color: #555;
        }

        .success-animation {
            color: #4ade80;
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .problem-section {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .problem-section label {
            display: block;
            font-size: 13px;
            color: #ffcc00;
            margin-bottom: 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .problem-text {
            margin: 0;
            color: #ffffff;
            font-size: 17px;
            font-weight: 600;
            line-height: 1.5;
        }

        /* Control Center Styles */
        .control-center {
            display: flex;
            background-color: rgba(255,255,255,0.05);
            padding: 6px;
            border-radius: 14px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .control-btn {
            flex: 1;
            padding: 14px;
            border: none;
            background: transparent;
            color: #777;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 15px;
        }

        .control-btn.active {
            background-color: #007BFF;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        /* Closing Form Styles */
        .closing-form {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 12px;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-field label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }

        .form-field input, .form-field textarea {
            width: 100%;
            background-color: #0d1a33;
            border: 1px solid #2c3e50;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn-submit-close {
            background: linear-gradient(135deg, #2ed573, #7bed9f);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-submit-close:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* Improved Form Field Styles */
        .form-field input, .form-field textarea {
            width: 100%;
            background-color: #0d1a33;
            border: 2px solid #2c3e50;
            color: white;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-field input:focus, .form-field textarea:focus {
            outline: none;
            border-color: #007BFF;
            background-color: #162447;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.2);
        }

        /* Department Filter Styles */
        .filter-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            justify-content: center;
        }

        .dept-btn {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dept-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .dept-btn.active {
            background-color: #007BFF;
            color: white;
            border-color: #007BFF;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="header">
            <h1>จัดการงานค้าง</h1>
            <a href="index.html" class="btn-back">กลับหน้าหลัก</a>
        </div>

        <div class="control-center">
            <button class="control-btn active" id="tabSevenMean" onclick="switchTab('sevenMean')">ปิดรหัส 7 mean</button>
            <button class="control-btn" id="tabPending" onclick="switchTab('pending')">ปิดงานค้าง</button>
        </div>

        <div class="filter-container" id="deptFilterContainer">
            <button class="dept-btn active" onclick="switchDept('All', this)">ทั้งหมด</button>
            <button class="dept-btn" onclick="switchDept('Press', this)">Press</button>
            <button class="dept-btn" onclick="switchDept('Ass\'y', this)">Ass'y</button>
            <button class="dept-btn" onclick="switchDept('Project', this)">Project</button>
            <button class="dept-btn" onclick="switchDept('UT', this)">UT</button>
        </div>

        <div id="recordsList">
            <!-- Records will be loaded here -->
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYPLqS7Xaiyc9Ev5GoMZoOEkndOVXtASyrsqu2n9GvLyusKXa0pKdoxb4FO6vrAUYgkw/exec";

        function formatDMY(dateStr) {
            if (!dateStr) return "-";
            const str = String(dateStr).replace(/^'/, '');
            
            // 1. ISO YYYY-MM-DD
            const isoMatch = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
            if (isoMatch) {
                return `${isoMatch[3]}/${isoMatch[2]}/${isoMatch[1]}`;
            }

            // 2. Strict DD/MM/YYYY (handles our new save format)
            const strictDmyMatch = str.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
            if (strictDmyMatch) {
                return `${strictDmyMatch[1]}/${strictDmyMatch[2]}/${strictDmyMatch[3]}`;
            }
            
            // 3. Try Date object (handles legacy M/D/Y data without leading zeros)
            try {
                const d = new Date(dateStr);
                if (!isNaN(d.getTime())) {
                    const day = String(d.getDate()).padStart(2, '0');
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const year = d.getFullYear();
                    return `${day}/${month}/${year}`;
                }
            } catch (e) {}

            // 3. Fallback explicitly to D/M/Y if Date parsing failed (e.g. 30/12/2026)
            const dmyMatch = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
            if (dmyMatch) {
                let d = dmyMatch[1].padStart(2, '0');
                let m = dmyMatch[2].padStart(2, '0');
                let y = dmyMatch[3];
                if (y.length === 2) y = "20" + y;
                return `${d}/${m}/${y}`;
            }

            return dateStr;
        }

        function formatTimeOnly(timeStr) {
            if (!timeStr) return "-";
            const str = String(timeStr);
            
            // If it's a full ISO string or contains date info, use Date object for local time
            if (str.includes('T') || str.includes('-')) {
                try {
                    const d = new Date(str);
                    if (!isNaN(d.getTime())) {
                        const hours = String(d.getHours()).padStart(2, '0');
                        const minutes = String(d.getMinutes()).padStart(2, '0');
                        return `${hours}:${minutes}`;
                    }
                } catch (e) {}
            }
            
            // Fallback to simple regex for HH:mm
            const simpleTimeMatch = str.match(/^(\d{1,2}:\d{2})/);
            if (simpleTimeMatch) return simpleTimeMatch[1];
            
            return timeStr;
        }

        let currentTab = 'sevenMean';
        let currentDept = 'All';

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabSevenMean').classList.toggle('active', tab === 'sevenMean');
            document.getElementById('tabPending').classList.toggle('active', tab === 'pending');
            loadRecords();
        }

        function switchDept(dept, btn) {
            currentDept = dept;
            const buttons = document.querySelectorAll('.dept-btn');
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadRecords();
        }

        async function loadRecords() {
            const list = document.getElementById('recordsList');
            let breakdowns = [];
            
            // 1. Show local data first
            try {
                const data = localStorage.getItem("breakdowns");
                if (data) breakdowns = JSON.parse(data);
            } catch (err) { console.error(err); }

            renderByTab(breakdowns, list);

            // 2. Fetch fresh data from Google Sheets
            try {
                const response = await fetch(SCRIPT_URL);
                const googleData = await response.json();
                if (googleData && Array.isArray(googleData)) {
                    // Map with original index from googleData to ensure correct row update
                    const cloudBreakdowns = googleData
                        .map((row, originalIndex) => ({
                            date: row[0], line: row[1], machineId: row[2], caseCount: 1,
                            time: row[3], finishTime: row[4], duration: row[5], department: row[6],
                            problem: row[7], solution: row[8], sparePart: row[9], sevenMean: row[10],
                            id: originalIndex // This is the real row index in the sheet!
                        }))
                        .filter((r, idx) => idx > 0 && r.date && r.machineId); // Skip header and empty rows

                    localStorage.setItem("breakdowns", JSON.stringify(cloudBreakdowns));
                    renderByTab(cloudBreakdowns, list);
                }
            } catch (e) { console.error("Fetch error:", e); }
        }

        function renderByTab(breakdowns, list) {
            // Apply Department Filter
            let filtered = breakdowns;
            if (currentDept !== 'All') {
                filtered = breakdowns.filter(r => r.department === currentDept);
            }

            if (currentTab === 'sevenMean') {
                // Filter: Finished work but missing 7-mean
                const pending = filtered.filter(r => {
                    const isFinished = r.finishTime && r.finishTime !== "-" && String(r.finishTime).trim() !== "";
                    const missingSeven = !r.sevenMean || r.sevenMean === "-" || String(r.sevenMean).trim() === "";
                    return isFinished && missingSeven;
                });
                renderSevenMeanTab(pending, list);
            } else {
                // Filter: Open work
                const openWork = filtered.filter(r => {
                    return !r.finishTime || r.finishTime === "-" || String(r.finishTime).trim() === "";
                });
                renderPendingTab(openWork, list);
            }
        }

        function renderSevenMeanTab(records, container) {
            if (records.length === 0) {
                container.innerHTML = `<div class="no-data"><p>ไม่มีรายการค้างปิดรหัส 7 mean</p></div>`;
                return;
            }

            container.innerHTML = records.map(record => `
                <div class="record-card" id="card-${record.id}">
                    <div class="problem-section"><label>อาการเสีย (Problem)</label><p class="problem-text">${record.problem}</p></div>
                    <div class="card-grid">
                        <div class="card-item"><label>วันที่ / เวลา</label><span>${formatDMY(record.date)} ${formatTimeOnly(record.time)}</span></div>
                        <div class="card-item"><label>ไลน์ผลิต</label><span>${record.line}</span></div>
                        <div class="card-item"><label>เครื่องจักร</label><span>${record.machineId}</span></div>
                    </div>
                    <div class="input-group">
                        <input type="text" id="input-${record.id}" placeholder="กรอกรหัส 7 mean..." autocomplete="off">
                        <button onclick="updateSevenMean(${record.id}, this)">บันทึก</button>
                    </div>
                </div>
            `).join('');
        }

        function renderPendingTab(records, container) {
            if (records.length === 0) {
                container.innerHTML = `<div class="no-data"><p>ไม่มีรายการงานค้าง (ทุกอย่างปิดหมดแล้ว)</p></div>`;
                return;
            }

            container.innerHTML = records.map(record => `
                <div class="record-card" id="card-${record.id}">
                    <div class="problem-section"><label>อาการเสีย (Problem)</label><p class="problem-text">${record.problem}</p></div>
                    <div class="card-grid">
                        <div class="card-item"><label>วันที่แจ้ง</label><span>${formatDMY(record.date)} ${formatTimeOnly(record.time)}</span></div>
                        <div class="card-item"><label>ไลน์ผลิต</label><span>${record.line}</span></div>
                        <div class="card-item"><label>เครื่องจักร</label><span>${record.machineId}</span></div>
                    </div>
                    
                    <div class="closing-form">
                        <div class="form-row">
                            <div class="form-field">
                                <label>เวลาซ่อมเสร็จ:</label>
                                <input type="text" id="finish-${record.id}" placeholder="-- : --" maxlength="5">
                            </div>
                            <div class="form-field">
                                <label>รหัส 7 mean:</label>
                                <input type="text" id="seven-${record.id}" placeholder="รหัส 7 mean">
                            </div>
                        </div>
                        <div class="form-field">
                            <label>วิธีแก้ไข:</label>
                            <textarea id="sol-${record.id}" rows="2" placeholder="ระบุวิธีแก้ไข..."></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-field">
                                <label>ชื่ออะไหล่:</label>
                                <input type="text" id="partName-${record.id}" placeholder="ชื่ออะไหล่">
                            </div>
                            <div class="form-field">
                                <label>รุ่น / โมเดล:</label>
                                <input type="text" id="partModel-${record.id}" placeholder="รุ่น / โมเดล">
                            </div>
                        </div>
                        <button class="btn-submit-close" onclick="closePendingWork(${record.id}, this)">ปิดงาน (Finish Job)</button>
                    </div>
                </div>
            `).join('');

            // Setup time inputs
            records.forEach(r => setupTimeInput(`finish-${r.id}`));
        }

        function setupTimeInput(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('input', function(e) {
                let val = e.target.value.replace(/\D/g, '');
                if (val.length > 2) val = val.slice(0, 2) + ":" + val.slice(2, 4);
                e.target.value = val;
            });
        }

        async function closePendingWork(id, btn) {
            const finishTime = document.getElementById(`finish-${id}`).value;
            const solution = document.getElementById(`sol-${id}`).value.trim();
            const sevenMean = document.getElementById(`seven-${id}`).value.trim();
            const partName = document.getElementById(`partName-${id}`).value.trim();
            const partModel = document.getElementById(`partModel-${id}`).value.trim();

            if (!finishTime || !solution) {
                alert("กรุณากรอกเวลาซ่อมเสร็จและวิธีแก้ไข");
                return;
            }

            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> กำลังบันทึก...';

            const sparePart = partModel ? `${partName} (${partModel})` : partName;

            try {
                // We'll calculate duration locally if possible
                let duration = "-";
                let breakdowns = JSON.parse(localStorage.getItem("breakdowns")) || [];
                const record = breakdowns.find(r => r.id === id);
                if (record && record.time && finishTime) {
                    const [h1, m1] = record.time.split(':').map(Number);
                    const [h2, m2] = finishTime.split(':').map(Number);
                    let diff = (h2 * 60 + m2) - (h1 * 60 + m1);
                    if (diff < 0) diff += 1440;
                    duration = `${diff} นาที`;
                }

                const formData = new URLSearchParams();
                formData.append('action', 'update');
                formData.append('rowIndex', id);
                formData.append('finishTime', finishTime);
                formData.append('solution', solution);
                formData.append('sevenMean', sevenMean);
                formData.append('sparePart', sparePart);
                formData.append('duration', duration);

                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });

                const index = breakdowns.findIndex(r => r.id === id);
                if (index !== -1) {
                    breakdowns[index].finishTime = finishTime;
                    breakdowns[index].solution = solution;
                    breakdowns[index].sevenMean = sevenMean;
                    breakdowns[index].sparePart = sparePart;
                    breakdowns[index].duration = duration;
                    localStorage.setItem("breakdowns", JSON.stringify(breakdowns));
                    
                    const card = document.getElementById(`card-${id}`);
                    card.style.borderLeftColor = '#4ade80';
                    card.innerHTML = `<h3 class="success-animation" style="text-align: center; padding: 40px;">ปิดงานสำเร็จแล้ว!</h3>`;
                    setTimeout(() => loadRecords(), 1000);
                }
            } catch (err) {
                console.error(err);
                alert("เกิดข้อผิดพลาด");
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        async function updateSevenMean(id, btn) {
            const input = document.getElementById(`input-${id}`);
            const val = input.value.trim();
            
            if (!val) {
                alert("กรุณากรอกรหัส 7 mean");
                input.focus();
                return;
            }

            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span>';
            
            try {
                const formData = new URLSearchParams();
                formData.append('action', 'update');
                formData.append('rowIndex', id);
                formData.append('sevenMean', val);

                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });

                let breakdowns = JSON.parse(localStorage.getItem("breakdowns")) || [];
                const index = breakdowns.findIndex(r => r.id === id);
                
                if (index !== -1) {
                    breakdowns[index].sevenMean = val;
                    localStorage.setItem("breakdowns", JSON.stringify(breakdowns));
                    const card = document.getElementById(`card-${id}`);
                    card.style.borderLeftColor = '#4ade80';
                    card.innerHTML = `<h3 class="success-animation" style="text-align: center; padding: 40px;">บันทึกรหัสเรียบร้อยแล้ว!</h3>`;
                    setTimeout(() => loadRecords(), 1000);
                }
            } catch (err) {
                console.error(err);
                alert("เกิดข้อผิดพลาด");
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        window.onload = loadRecords;
    </script>
</body>
</html>

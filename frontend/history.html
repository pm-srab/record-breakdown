<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance History - SRAB</title>
    <link rel="icon" type="image/png" href="static/summit_logo.png">
    <script src="theme.js?v=2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-history">
    <div class="container">
        <div class="header">
            <h1>ประวัติการซ่อม (History)</h1>
            <div>
                <a href="index.html" class="btn-back">
                    กลับหน้าหลัก
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
                </a>
            </div>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search Machine ID (e.g. BP001)..." oninput="handleSearch()">
            <svg style="position: absolute; right: 15px; top: 12px; color: #555;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </div>

        <div class="status-badges">
            <div id="qrIndicator" class="qr-indicator">
                ✨ Scanned Machine Detected
            </div>
            <div id="countBadge" class="count-badge">
                Total: 0 Breakdowns
            </div>
        </div>

        <div id="loading" class="loading-spinner" style="display: none;"></div>
        <div id="historyList" class="history-list"></div>
    </div>

    <script>
        const SCRIPT_URL = "/api/breakdowns";
        let allRecords = [];

        async function init() {
            // 1. Check for URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const machineId = urlParams.get('machineId');
            
            if (machineId) {
                document.getElementById('searchInput').value = machineId.toUpperCase();
                document.getElementById('qrIndicator').style.display = 'block';
                document.getElementById('qrIndicator').textContent = `🔍 Filtering for: ${machineId.toUpperCase()}`;
            }

            // 2. Load data
            await loadRecords();
        }

        async function loadRecords() {
            const list = document.getElementById('historyList');
            const loading = document.getElementById('loading');
            
            // Try localStorage first
            const localData = localStorage.getItem("breakdowns");
            if (localData) {
                allRecords = JSON.parse(localData);
                renderRecords(allRecords);
            }

            // Fetch fresh data
            loading.style.display = 'block';
            try {
                const response = await fetch(SCRIPT_URL);
                const googleData = await response.json();
                
                if (googleData && Array.isArray(googleData)) {
                    allRecords = googleData
                        .map((row, idx) => ({
                            date: row[0],
                            line: row[1],
                            machineId: row[2],
                            time: row[3],
                            finishDate: row[4],
                            finishTime: row[5],
                            duration: row[6],
                            department: row[7],
                            factory: row[8],
                            problem: row[9],
                            solution: row[10],
                            sparePart: row[11],
                            sevenMean: row[12]
                        }))
                        .filter((r, idx) => {
                            const isHeader = String(r.date).includes("วันที่") || String(r.machineId).includes("เครื่องจักร");
                            return idx > 0 && r.date && r.machineId && !isHeader;
                        });
                    
                    localStorage.setItem("breakdowns", JSON.stringify(allRecords));
                    renderRecords(allRecords);
                }
            } catch (err) {
                console.error("Fetch error:", err);
            } finally {
                loading.style.display = 'none';
            }
        }

        function handleSearch() {
            const input = document.getElementById('searchInput');
            input.value = input.value.toUpperCase();
            const query = input.value;
            // Hide QR indicator if user starts typing something else
            if (query && !window.location.search.includes(query)) {
                document.getElementById('qrIndicator').style.display = 'none';
            }
            renderRecords(allRecords);
        }

        function renderRecords(records) {
            const list = document.getElementById('historyList');
            const countBadge = document.getElementById('countBadge');
            const query = document.getElementById('searchInput').value.trim().toUpperCase();
            
            let filtered = records;
            if (query) {
                filtered = records.filter(r => 
                    String(r.machineId).toUpperCase().includes(query) || 
                    String(r.problem).toUpperCase().includes(query)
                );
            }

            // Update count badge
            if (query && filtered.length > 0) {
                countBadge.style.display = 'block';
                countBadge.innerHTML = `⚠️ ทั้งหมด: ${filtered.length} ครั้ง`;
            } else {
                countBadge.style.display = 'none';
            }

            // Sort by date (newest first)
            filtered.sort((a, b) => {
                // Simplified sort by assuming row index/original order was chronological
                return 0; // The data from sheet is usually chronological, so we can just reverse it if needed
            });
            
            // Actually, let's reverse it to show newest at top
            const displayList = [...filtered].reverse();

            if (displayList.length === 0) {
                list.innerHTML = `<div class="no-results">No records found ${query ? `for "${query}"` : ''}</div>`;
                return;
            }

            list.innerHTML = displayList.map((r, i) => {
                const hasExtra = (r.solution && r.solution !== '-') || (r.sparePart && r.sparePart !== '-');
                
                // Calculate duration in minutes for display if missing in sheet
                let durationDisplay = r.duration || "-";
                if ((!durationDisplay || durationDisplay === "-") && r.time && r.finishTime && r.finishTime !== "-") {
                    const [h1, m1] = formatTimeOnly(r.time).split(':').map(Number);
                    const [h2, m2] = formatTimeOnly(r.finishTime).split(':').map(Number);
                    if (!isNaN(h1) && !isNaN(m1) && !isNaN(h2) && !isNaN(m2)) {
                        let startMin = h1 * 60 + m1;
                        let endMin = h2 * 60 + m2;
                        if (endMin < startMin) endMin += 1440;
                        durationDisplay = (endMin - startMin) + " นาที";
                    }
                }

                return `
                <div class="record-card">
                    <!-- One-line compact info row -->
                    <div class="card-info-row">
                        <div class="machine-id">${r.machineId}</div>
                        <div class="dot-sep"></div>
                        <div class="info-chip">L: <strong>${r.line || '-'}</strong></div>
                        <div class="dot-sep"></div>
                        <div class="info-chip"><strong>${formatTimeOnly(r.time)}</strong>–<strong>${formatTimeOnly(r.finishTime)}</strong></div>
                        <div class="dot-sep"></div>
                        <div class="info-chip"><strong>${r.department || '-'}</strong></div>
                        ${durationDisplay && durationDisplay !== "-" ? `<div class="dot-sep"></div><div class="info-chip">⏱ <strong>${durationDisplay}</strong></div>` : ''}
                        <div class="record-date">${formatDMY(r.date)}</div>
                    </div>

                    <!-- อาการเสีย row -->
                    <div class="problem-row">
                        <span class="problem-label">อาการเสีย</span>
                        <div class="problem-text">${r.problem || '-'}</div>
                    </div>

                    <!-- Expand toggle -->
                    ${hasExtra ? `
                    <button class="btn-expand" id="btn-${i}" onclick="toggleDetail(${i})">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
                        อะไหล่ &amp; การแก้ไข
                    </button>
                    <div class="card-detail" id="detail-${i}">
                        <div class="detail-inner">
                            ${r.solution && r.solution !== '-' ? `
                            <div class="solution-box">
                                <label>การแก้ไข (Solution)</label>
                                <div class="problem-text">${r.solution}</div>
                            </div>` : ''}
                            ${r.sparePart && r.sparePart !== '-' ? `<div class="spare-badge">🔧 อะไหล่: ${r.sparePart}</div>` : ''}
                        </div>
                    </div>` : ''}
                </div>
            `}).join('');
        }

        function formatDMY(dateStr) {
            if (!dateStr) return "-";
            const str = String(dateStr).replace(/^'/, '');
            
            const isoMatch = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
            if (isoMatch) return `${isoMatch[3]}/${isoMatch[2]}/${isoMatch[1]}`;

            const strictDmyMatch = str.match(/^(\d{2})\/(\d{2})\/(\d{4})(.*)$/);
            if (strictDmyMatch) return `${strictDmyMatch[1]}/${strictDmyMatch[2]}/${strictDmyMatch[3]}`;
            
            const dmyMatch = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
            if (dmyMatch) {
                let d = dmyMatch[1].padStart(2, '0');
                let m = dmyMatch[2].padStart(2, '0');
                let y = dmyMatch[3];
                if (y.length === 2) y = "20" + y;
                return `${d}/${m}/${y}`;
            }

            return dateStr;
        }

        function formatTimeOnly(timeStr) {
            if (!timeStr || timeStr === "-") return "-";
            const str = String(timeStr);
            
            if (str.includes('T') || str.includes('-')) {
                try {
                    const d = new Date(str);
                    if (!isNaN(d.getTime())) {
                        return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                    }
                } catch (e) {}
            }
            
            const simpleTimeMatch = str.match(/^(\d{1,2}:\d{2})/);
            if (simpleTimeMatch) return simpleTimeMatch[1];
            
            return timeStr;
        }

        function toggleDetail(i) {
            const detail = document.getElementById(`detail-${i}`);
            const btn = document.getElementById(`btn-${i}`);
            const isOpen = detail.classList.contains('open');
            detail.classList.toggle('open', !isOpen);
            btn.classList.toggle('open', !isOpen);
        }

        window.onload = init;
    </script>
</body>
</html>

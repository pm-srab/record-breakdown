<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Break Down</title>
    <link rel="icon" type="image/png" href="static/summit_logo.png">
    <script src="theme.js?v=2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-record">
    <div class="container" id="mainContainer">
        <div id="pendingWorkView" class="view-section active">
            <h2>บันทึกอาการเสีย</h2>
            <form id="pendingForm">
                <div class="form-group">
                    <label for="p_breakdownDate">วันที่แจ้งซ่อม (DATE):</label>
                    <input type="date" id="p_breakdownDate" required>
                </div>

                <div class="form-group">
                    <label for="p_breakdownTime">เวลาแจ้งซ่อม:</label>
                    <input type="text" id="p_breakdownTime" placeholder="-- : --" maxlength="5" inputmode="numeric" autocomplete="off" required>
                </div>

                <div class="form-group">
                    <label for="p_productionLine">ไลน์การผลิต: <span style="font-weight: normal; color: #555; font-size: 12px;">(ตัวอย่าง: Line A1 พิมพ์แค่ A1)</span></label>
                    <div class="input-prefix-wrapper">
                        <span class="prefix">Line </span>
                        <input type="text" id="p_productionLine" placeholder="เช่น A1" autocomplete="off" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="p_machineId">รหัสเครื่องจักร: <span style="font-weight: normal; color: #555; font-size: 12px;">(ตัวอย่าง: BP001)</span></label>
                    <input type="text" id="p_machineId" placeholder="เช่น BP001" autocomplete="off" required>
                </div>

                <div class="form-group">
                    <label for="p_department">หน่วยงาน:</label>
                    <select id="p_department" required>
                        <option value="" disabled selected>เลือกหน่วยงาน</option>
                        <option value="Press">Press</option>
                        <option value="Ass'y">Ass'y</option>
                        <option value="Project">Project</option>
                        <option value="UT">UT</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="p_factory">โรงงาน (Factory):</label>
                    <select id="p_factory" required>
                        <option value="" disabled selected>เลือกโรงงาน</option>
                        <option value="โรง1">โรง1</option>
                        <option value="โรง2">โรง2</option>
                        <option value="โรง3">โรง3</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="p_problem">อาการเสีย <span class="requirement">(ขั้นต่ำ 20 ตัวอักษร)</span>:</label>
                    <textarea id="p_problem" placeholder="ระบุอาการเสีย (อย่างน้อย 20 ตัวอักษร)" rows="3" required minlength="20"></textarea>
                    <div id="p_problemCount" style="font-size: 11px; text-align: right; color: #888; margin-top: 5px;">0 / 20</div>
                </div>

                <div class="button-group">
                    <button type="submit">บันทึกงาน</button>
                    <a href="index.html" class="btn-link btn-back">กลับหน้าหลัก</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function setupCharCounter(id, countId, min) {
            const el = document.getElementById(id);
            const countEl = document.getElementById(countId);
            if (!el || !countEl) return;
            
            const update = () => {
                const len = el.value.length;
                countEl.textContent = `${len} / ${min}`;
                if (len < min) {
                    countEl.style.color = '#ff4d4d';
                } else {
                    countEl.style.color = '#4ade80';
                }
            };
            
            el.addEventListener('input', update);
            update();
        }
        
        setupCharCounter('p_problem', 'p_problemCount', 20);

        // Force Uppercase Logic
        document.getElementById('p_productionLine').addEventListener('input', function() {
            this.value = this.value.toUpperCase();
        });
        document.getElementById('p_machineId').addEventListener('input', function() {
            this.value = this.value.toUpperCase();
        });

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYPLqS7Xaiyc9Ev5GoMZoOEkndOVXtASyrsqu2n9GvLyusKXa0pKdoxb4FO6vrAUYgkw/exec";

        function setupTimeInput(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('input', function(e) {
                const originalValue = e.target.value;
                const originalCursor = e.target.selectionStart;
                
                let digits = originalValue.replace(/\D/g, '');
                let formatted = '';

                if (digits.length > 2) {
                    let hh = digits.slice(0, 2);
                    let mm = digits.slice(2, 4);
                    if (parseInt(hh) > 23) hh = '23';
                    if (parseInt(mm) > 59) mm = '59';
                    formatted = hh + ":" + mm;
                } else if (digits.length > 0) {
                    let hh = digits;
                    if (parseInt(hh) > 23) hh = '23';
                    formatted = hh;
                }

                if (originalValue !== formatted) {
                    e.target.value = formatted;
                    // Fix cursor position
                    let newCursor = originalCursor;
                    if (formatted.length > originalValue.length && originalCursor === 3) {
                        newCursor = 4;
                    } else if (formatted.length < originalValue.length && originalCursor === 3) {
                        newCursor = 2;
                    }
                    e.target.setSelectionRange(newCursor, newCursor);
                }
            });
        }
        
        setupTimeInput('p_breakdownTime');

        // Set default date to today
        const today = new Date();
        const pad = (n) => String(n).padStart(2, '0');
        document.getElementById('p_breakdownDate').value = `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${pad(today.getDate())}`;

        // Pending Form Submit Logic
        document.getElementById('pendingForm').onsubmit = async (e) => {
            e.preventDefault();
            const form = e.target;
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.innerHTML;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> กำลังบันทึก...';

            const time = document.getElementById('p_breakdownTime').value;
            const line = "Line " + document.getElementById('p_productionLine').value.trim();
            const machineId = document.getElementById('p_machineId').value.trim();
            const department = document.getElementById('p_department').value.trim();
            const factory = document.getElementById('p_factory').value.trim();
            const problem = document.getElementById('p_problem').value.trim();

            const selectedDateVal = document.getElementById('p_breakdownDate').value;
            let formattedDate = "";
            if (selectedDateVal) {
                const parts = selectedDateVal.split('-');
                if (parts.length === 3) {
                    const now = new Date();
                    const pad = (n) => String(n).padStart(2, '0');
                    formattedDate = `'${parts[2]}/${parts[1]}/${parts[0]} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
                }
            }
            if (!formattedDate) {
                const now = new Date();
                const pad = (n) => String(n).padStart(2, '0');
                formattedDate = `'${pad(now.getDate())}/${pad(now.getMonth() + 1)}/${now.getFullYear()} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
            }

            const breakdownEntry = {
                id: Date.now(),
                time: time,
                line: line,
                machineId: machineId,
                department: department,
                factory: factory,
                problem: problem,
                solution: "-",
                sparePart: "-",
                finishDate: "-",
                finishTime: "-",
                duration: "-",
                sevenMean: "",
                caseCount: 1,
                date: formattedDate
            };

            try {
                const formData = new URLSearchParams();
                for (const key in breakdownEntry) {
                    formData.append(key, breakdownEntry[key]);
                }

                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });

                const data = localStorage.getItem("breakdowns");
                const breakdowns = data ? JSON.parse(data) : [];
                breakdowns.push(breakdownEntry);
                localStorage.setItem("breakdowns", JSON.stringify(breakdowns));

                alert("บันทึกงานสำเร็จ!");
                window.location.href = "dashboard.html";
            } catch (error) {
                console.error(error);
                alert("เกิดข้อผิดพลาด แต่ข้อมูลถูกบันทึกไว้ในเครื่องแล้ว");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnText;
            }
        };
    </script>
</body>
</html>

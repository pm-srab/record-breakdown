<!DOCTYPE html>
<html lang="th"> 
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Record Break Down</title> 
<script src="theme.js?v=2"></script> 

<style>
:root {
    --bg: #1a1a1a;
    --card-bg: rgba(255,255,255,0.03);
    --card-border: rgba(255,255,255,0.05);
    --text-main: #ffffff;
    --text-sub: #888;
    --btn-bg: rgba(255,255,255,0.05);
    --btn-border: rgba(255,255,255,0.1);
    --btn-color: white;
    --shadow: 0 20px 50px rgba(0,0,0,0.4);
    transition: background-color 0.3s, color 0.3s;
}

[data-theme="light"] {
    --bg: #f0f2f5;
    --card-bg: rgba(255,255,255,0.9);
    --card-border: rgba(0,0,0,0.08);
    --text-main: #1a1a1a;
    --text-sub: #666;
    --btn-bg: rgba(0,0,0,0.04);
    --btn-border: rgba(0,0,0,0.12);
    --btn-color: #1a1a1a;
    --shadow: 0 20px 50px rgba(0,0,0,0.12);
}

* {
    box-sizing: border-box;
}
body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    color: var(--text-main);
    transition: background-color 0.3s, color 0.3s;
}
.container {
    text-align: center;
    width: 100%;
    max-width: 450px;
    padding: 40px 25px;
    background: var(--card-bg);
    border-radius: 24px;
    backdrop-filter: blur(10px);
    border: 1px solid var(--card-border);
    box-shadow: var(--shadow);
    position: relative;
    transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
}

.theme-toggle {
    position: absolute;
    top: 14px;
    right: 14px;
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    color: var(--text-main);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    font-size: 16px;
    line-height: 1;
}

.theme-toggle:hover {
    background: var(--btn-border);
    transform: rotate(20deg) scale(1.1);
}
h1 {
    margin-bottom: 8px;
    color: var(--text-main);
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
}
h3 {
    margin-bottom: 40px;
    color: var(--text-sub);
    font-size: 14px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 2px;
}
.btn-menu {
    padding: 18px 12px;
    margin: 0;
    font-size: 14px;
    cursor: pointer;
    border-radius: 20px;
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    color: var(--btn-color);
    width: 100%;
    font-weight: 600;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-decoration: none;
    touch-action: manipulation;
}
.btn-menu:hover { 
    transform: translateY(-4px);
    background: rgba(255, 255, 255, 0.1);
    border-color: var(--primary);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}
.btn-menu svg {
    color: #007BFF;
    width: 28px;
    height: 28px;
}
.btn-full {
    grid-column: span 2;
    flex-direction: row !important;
    background: linear-gradient(135deg, #007BFF, #0056b3);
    border: none;
    padding: 20px !important;
    font-size: 16px;
    font-weight: 700;
}
.btn-full svg {
    color: white;
}
.btn-full:hover {
    filter: brightness(1.1);
}

.menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    width: 100%;
}

.noti-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 25px;
}

.noti-badge {
    background: linear-gradient(135deg, #ff4757, #ff6b81);
    color: white;
    padding: 10px 15px;
    border-radius: 12px;
    font-weight: 800;
    font-size: 13px;
    display: none;
    box-shadow: 0 4px 15px rgba(255, 71, 87, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.1);
    text-align: center;
}

.noti-badge.press, .noti-badge.assy {
    background: linear-gradient(135deg, #ff4757, #ff6b81);
    box-shadow: 0 4px 15px rgba(255, 71, 87, 0.2);
}
</style> 
</head> 

<body> 
<div class="noti-container" style="width: 100%; max-width: 450px; margin-bottom: 15px;">
    <div id="pressNoti" class="noti-badge press"></div>
    <div id="assyNoti" class="noti-badge assy"></div>
</div>
<div class="container">
    <button class="theme-toggle" id="themeBtn" title="Toggle light/dark mode"></button>
    <h1>Maintenance SRAB</h1>
    <h3>Monitoring System</h3>
    <div class="menu-grid">
        <a href="record.html" class="btn-menu btn-full">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Record
        </a> 
        <a href="dashboard.html" class="btn-menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Dashboard
        </a>
        <a href="close7mean.html" class="btn-menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            ปิดงาน / 7 Mean
        </a>
        <a href="sparepart.html" class="btn-menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
            Spare Part
        </a>
        <a href="history.html" class="btn-menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            History
        </a>
    </div>
</div>

<script>


    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYPLqS7Xaiyc9Ev5GoMZoOEkndOVXtASyrsqu2n9GvLyusKXa0pKdoxb4FO6vrAUYgkw/exec";

    async function checkPending() {
        const noti = document.getElementById('pendingNoti');
        
        // 1. First check local storage for immediate display
        const localData = localStorage.getItem("breakdowns");
        if (localData) {
            const breakdowns = JSON.parse(localData).filter(r => {
                const isHeader = String(r.date).includes("วันที่") || String(r.machineId).includes("เครื่องจักร");
                return !isHeader;
            });
            renderNoti(breakdowns);
        }

        // 2. Fetch fresh data from Google Sheets in background
        try {
            const response = await fetch(SCRIPT_URL);
            const googleData = await response.json();
            
            if (googleData && Array.isArray(googleData)) {
                // Map with original index from googleData to ensure correct row tracking
                const cloudBreakdowns = googleData
                    .map((row, originalIndex) => ({
                        date: row[0],
                        line: row[1],
                        machineId: row[2],
                        caseCount: 1,
                        time: row[3],
                        finishTime: row[4],
                        duration: row[5],
                        department: row[6],
                        factory: row[7],
                        problem: row[8],
                        solution: row[9],
                        sparePart: row[10],
                        sevenMean: row[11],
                        id: originalIndex // This is the real row index in the sheet!
                    }))
                    .filter((r, idx) => {
                        const isHeader = String(r.date).includes("วันที่") || String(r.machineId).includes("เครื่องจักร");
                        return idx > 0 && r.date && r.machineId && !isHeader;
                    }); // Skip header and empty rows
                
                localStorage.setItem("breakdowns", JSON.stringify(cloudBreakdowns));
                renderNoti(cloudBreakdowns);
            }
        } catch (e) {
            console.error("Error fetching from Google Sheets:", e);
        }
    }

    function renderNoti(breakdowns) {
        const pressNoti = document.getElementById('pressNoti');
        const assyNoti = document.getElementById('assyNoti');
        
        // Count ONLY "Open Work"
        const pressPending = breakdowns.filter(r => {
            const isOpenWork = !r.finishTime || r.finishTime === "-" || String(r.finishTime).trim() === "";
            return isOpenWork && r.department === "Press";
        });
        
        const assyPending = breakdowns.filter(r => {
            const isOpenWork = !r.finishTime || r.finishTime === "-" || String(r.finishTime).trim() === "";
            return isOpenWork && r.department === "Ass'y";
        });
        
        if (pressPending.length > 0) {
            pressNoti.style.display = 'block';
            pressNoti.innerHTML = `⚠️ งานค้าง Press: ${pressPending.length} รายการ`;
        } else {
            pressNoti.style.display = 'none';
        }
        
        if (assyPending.length > 0) {
            assyNoti.style.display = 'block';
            assyNoti.innerHTML = `⚠️ งานค้าง Ass'y: ${assyPending.length} รายการ`;
        } else {
            assyNoti.style.display = 'none';
        }
    }
    
    window.onload = checkPending;
</script>
</body> 
</html>
